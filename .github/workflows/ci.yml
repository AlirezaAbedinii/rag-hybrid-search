name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (editable + dev tools + lightweight ingestion deps)
        # ingestion extra (pypdf/bs4/markdown-it) is light and lets the loader
        # tests run in CI. The heavy ML stack (chromadb/torch) stays out of CI.
        run: python -m pip install -e ".[dev,ingestion]"

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Test (pytest)
        run: python -m pytest

      - name: Eval smoke (mocked, no paid API calls)
        run: python eval/run_eval.py --smoke
